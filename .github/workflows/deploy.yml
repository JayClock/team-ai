name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=4096
  TZ: UTC
  GRADLE_OPTS: '-Dorg.gradle.daemon=false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Nx artifacts
        run: npx nx run-many -t build --projects=:apps:server,@web/main --parallel=2

      - name: Compute deploy version
        id: version
        run: echo "value=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Compute image namespace
        id: image
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/teamai-server:${{ steps.version.outputs.value }}
            ghcr.io/${{ steps.image.outputs.owner }}/teamai-server:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/teamai-web:${{ steps.version.outputs.value }}
            ghcr.io/${{ steps.image.outputs.owner }}/teamai-web:latest

      - name: Upload compose files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: docker-compose.yml,docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH || '/opt/team-ai' }}
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_VERSION: ${{ steps.version.outputs.value }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SERVER_IMAGE: ghcr.io/${{ steps.image.outputs.owner }}/teamai-server
          WEB_IMAGE: ghcr.io/${{ steps.image.outputs.owner }}/teamai-web
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH,DEPLOY_VERSION,GHCR_USERNAME,GHCR_TOKEN,SERVER_IMAGE,WEB_IMAGE
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_PATH="${DEPLOY_PATH:-/opt/team-ai}"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -f .env ]; then
              echo "Missing .env in $DEPLOY_PATH"
              exit 1
            fi

            upsert_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env; then
                sed -i "s#^${key}=.*#${key}=${value}#" .env
              else
                printf '%s=%s\n' "$key" "$value" >> .env
              fi
            }

            upsert_env VERSION "$DEPLOY_VERSION"
            upsert_env SERVER_IMAGE "$SERVER_IMAGE"
            upsert_env WEB_IMAGE "$WEB_IMAGE"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
