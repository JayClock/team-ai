spring:
  main:
    banner-mode: 'off'
  ai:
    mcp:
      server:
        name: team-ai-mcp
        version: 0.1.0
        instructions: Team AI MCP server for project, agent, task and event orchestration.
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp
  autoconfigure:
    exclude:
      - org.springframework.ai.model.deepseek.autoconfigure.DeepSeekChatAutoConfiguration
  jersey:
    application-path: /api
    type: filter

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email
            redirect-uri: '{baseUrl}/login/oauth2/code/github'
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-development-only-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

mybatis:
  mapper-locations: classpath:mybatis.mappers/**/*.xml
  config-location: classpath:mybatis-config.xml

logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [traceId=%X{traceId}] - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] - %msg%n'

team-ai:
  acp:
    gateway:
      mode: ${TEAM_AI_ACP_GATEWAY_MODE:local}
      base-url: ${TEAM_AI_ACP_GATEWAY_BASE_URL:http://127.0.0.1:3321}
      poll-interval-ms: ${TEAM_AI_ACP_GATEWAY_POLL_INTERVAL_MS:200}
      rollout:
        projects: ${TEAM_AI_ACP_GATEWAY_ROLLOUT_PROJECTS:}
        users: ${TEAM_AI_ACP_GATEWAY_ROLLOUT_USERS:}
        percent: ${TEAM_AI_ACP_GATEWAY_ROLLOUT_PERCENT:100}
      rollback:
        error-threshold: ${TEAM_AI_ACP_GATEWAY_ROLLBACK_ERROR_THRESHOLD:5}
        window-ms: ${TEAM_AI_ACP_GATEWAY_ROLLBACK_WINDOW_MS:60000}
        cooldown-ms: ${TEAM_AI_ACP_GATEWAY_ROLLBACK_COOLDOWN_MS:300000}
